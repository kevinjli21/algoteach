<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background matching app theme -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- Three connected nodes representing algorithm/graph patterns -->
  <!-- Edges -->
  <line x1="16" y1="8" x2="8" y2="22" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="24" y2="22" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#1f6feb" stroke-width="2" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="16" cy="8" r="3" fill="#58a6ff"/>
  <circle cx="8" cy="22" r="3" fill="#58a6ff"/>
  <circle cx="24" cy="22" r="3" fill="#58a6ff"/>
</svg>
